# fly.toml app configuration file generated for atlas-of-australia on 2026-04-26T21:28:29+10:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'atlas-of-australia'
primary_region = 'syd'

[build]

[env]
  PORT = '8080'

[http_service]
  # Must match the PORT env above — server.py listens on PORT.
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/proxy/status'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
